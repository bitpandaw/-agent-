redis:
  url_env: "REDIS_URL"  # 环境变量名，如 redis://localhost:6379
  default_url: "redis://localhost:6379"

embedding:
  provider: "sentence_transformers"
  model_name: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  cache_dir: ".hf_cache"
rag:
  top_k: 4
  score_threshold: 0.3
  collection_name: "default"
  distance: "cosine"  # l2 | cosine | ip
llm:
  provider: "deepseek"
  model: "deepseek-chat"
  base_url: "https://api.deepseek.com/v1"
  api_key_env: "DEEPSEEK_API_KEY"
  system_prompt: "你是一个维基百科多跳问答助手。当用户提问时，使用 search_knowledge 从知识库检索相关文章，使用 query_qa_records 查询历史问答，使用 search_article_graph 做多跳关联推理，然后基于检索到的内容给出准确回答。"
neo4j:
  uri: "bolt://localhost:7687"
  user: "neo4j"
  password: "u152142445"

paths:
  db: "hotpot.db"
  knowledge_file: "data/hotpot_knowledge.txt"
  state_dir: "state/logs"
  chroma_dir: "chroma_db"
  cache_dir: ".hf_cache"
  record_file: "record/record.json"
